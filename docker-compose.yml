# redbook-cli Docker Compose
#
# 使用方式:
#   docker compose up -d                              # 启动服务
#   docker compose exec cli xhs login                 # 登录
#   docker compose exec cli xhs search "关键词"       # 搜索
#   docker compose exec cli xhs publish -t "标题" -c "内容" -i /app/data/images/photo.jpg
#   docker compose logs -f                            # 查看日志
#   docker compose down                               # 停止
#
# 数据持久化:
#   ./docker/data/cookies/  — MCP cookies (登录态)
#   ./docker/data/images/   — 发布用的图片/视频

services:
  cli:
    build: .
    container_name: redbook-cli
    restart: unless-stopped
    init: true
    tty: true
    ports:
      - "18060:18060"   # MCP Server
      - "9222:9222"     # Chrome CDP
    volumes:
      - ./docker/data:/app/data
    environment:
      - ROD_BROWSER_BIN=/usr/bin/google-chrome
      - COOKIES_PATH=/app/data/cookies/cookies.json
      - XHS_PROXY=${XHS_PROXY:-}
    # 启动 MCP 服务，CLI 命令通过 docker compose exec 执行
    command: /app/mcp/xiaohongshu-mcp-linux-amd64
